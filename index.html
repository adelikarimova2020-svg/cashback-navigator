<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="utf-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

<title>Cashback Navigator V9</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<h1>💳 Cashback Navigator V9</h1>

<input
  id="query"
  type="text"
  autocomplete="off"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
  placeholder="DNS, ДНС, КБ, Пятёрка, MCC">

<input
  id="amount"
  type="number"
  inputmode="numeric"
  placeholder="Сумма покупки">

<button onclick="findBest()">
  Подобрать карту
</button>

<div id="result"></div>

<h2>💳 Карты</h2>

<button
  id="cardsBtn"
  onclick="showCards()">
  ⚙️ Управление картами
</button>

<div id="cardsPanel"></div>

<h2>🕒 История</h2>

<button
  id="historyBtn"
  onclick="toggleHistory()">
  🕒 Показать историю
</button>

<div
  id="historyWrapper"
  style="display:none;">

  <div id="history"></div>

</div>

<script src="app.js"></script>

</body>
</html>
